<!DOCTYPE html>
<html lang="es" style="background:#0d0d0f">
<head>
<meta charset="UTF-8">
<style>html,body{background:#0d0d0f !important}</style>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Grid — Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #0d0d0f;
    --surface:    #131316;
    --border:     #1e1e24;
    --accent:     #c18dab;
    --accent2:    #ff9f50;
    --text:       #e0e0e0;
    --muted:      #555560;
    --steam:      #1a9fff;
    --epic:       #2ecc71;
    --blizzard:   #00aeff;
    --card-w:     110px;
    --card-h:     165px;
    --gap:        14px;
    --radius:     10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: transparent;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  #app {
    display: flex;
    flex-direction: column;
    background: rgba(13, 13, 15, 0.90);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.06);
  }

  #topbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 8px 16px;
    background: rgba(19, 19, 22, 0.85);
    border-bottom: 1px solid var(--border);
    border-radius: 14px 14px 0 0;
    flex-shrink: 0;
    -webkit-app-region: drag;
  }

  /* Elementos dentro del topbar no deben ser arrastrables */
  #topbar > * { -webkit-app-region: no-drag; }

  #logo {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent2);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  #search-wrap { flex: 1; position: relative; max-width: 380px; }
  #search-wrap svg {
    position: absolute; left: 10px; top: 50%;
    transform: translateY(-50%); opacity: 0.4; pointer-events: none;
  }
  #search {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 7px 12px 7px 34px;
    outline: none;
    transition: border-color 0.2s;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }

  #filters { display: flex; gap: 6px; flex-shrink: 0; }
  .filter-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    padding: 5px 10px;
    cursor: pointer;
    transition: all 0.18s;
    text-transform: uppercase;
  }
  .filter-btn:hover  { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #0d0d0f; }
  .filter-btn[data-type="Steam"].active   { background: var(--accent2);  border-color: var(--accent2);  color: #0d0d0f; }
  .filter-btn[data-type="Epic"].active    { background: var(--epic);     border-color: var(--epic);     color: #fff; }
  .filter-btn[data-type="Blizzard"].active{ background: var(--blizzard); border-color: var(--blizzard); color: #fff; }

  #count { font-size: 11px; color: var(--muted); white-space: nowrap; }
  #count span { color: var(--accent2); font-weight: 600; }



  /* Grid */
  #grid-wrap {
    overflow: visible;
    padding: 20px;
    position: relative;
  }

  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, var(--card-w));
    gap: var(--gap);
    justify-content: center;
  }

  /* Card */
  .card {
    position: relative;
    width: var(--card-w); height: var(--card-h);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.22s cubic-bezier(.34,1.4,.64,1), box-shadow 0.22s;
    background: var(--surface);
    border: 1px solid var(--border);
    animation: fadeIn 0.3s ease both;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .card:hover {
    transform: scale(1.07) translateY(-3px);
    box-shadow: 0 12px 36px rgba(0,0,0,0.55), 0 0 0 1px var(--accent);
    z-index: 10;
  }
  .card > .cover { width: 100%; height: 100%; object-fit: cover; display: block; transition: filter 0.22s; }
  .card:hover > .cover { filter: brightness(1.08); }

  /* Badge con icono PNG */
  .badge {
    position: absolute; top: 5px; right: 5px;
    width: 20px; height: 20px;
    border-radius: 5px;
    overflow: hidden;
    opacity: 0.9;
    backdrop-filter: blur(4px);
    background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center;
  }
  .badge img { width: 14px; height: 14px; object-fit: contain; }

  /* Tooltip nombre */
  .card-tooltip {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.88) 60%);
    padding: 18px 6px 6px;
    font-size: 10px; font-weight: 500; color: #fff; line-height: 1.2;
    opacity: 0; transform: translateY(4px);
    transition: opacity 0.18s, transform 0.18s; pointer-events: none;
  }
  .card:hover .card-tooltip { opacity: 1; transform: translateY(0); }

  #empty { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; color: var(--muted); }
  #empty.visible { display: flex; }
  #empty svg { opacity: 0.3; }
  #empty p { font-size: 14px; }

  #grid-wrap { scrollbar-gutter: stable; }

  /* ── TOGGLE VIEW BUTTON ── */
  #btn-view {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 15px;
    width: 28px; height: 24px;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  #btn-view:hover  { border-color: var(--accent2); color: var(--accent2); }
  #btn-view.active { background: var(--accent2); border-color: var(--accent2); color: #0d0d0f; }

  /* ── CARRUSEL ── */
  #carousel-wrap {
    display: none;
    position: relative;
    align-items: center;
    padding: 20px 60px;
    overflow: hidden;
  }
  #carousel-wrap.visible { display: flex; }

  #carousel {
    display: flex;
    gap: 16px;
    overflow: hidden;
    scroll-behavior: smooth;
    align-items: center;
  }

  /* Card en modo carrusel — más grande */
  #carousel .card {
    flex-shrink: 0;
    width: 150px;
    height: 225px;
    transition: transform 0.3s cubic-bezier(.34,1.4,.64,1), box-shadow 0.3s, opacity 0.3s;
    opacity: 0.55;
    border-radius: 12px;
  }
  #carousel .card.active-card {
    transform: scale(1.12);
    opacity: 1;
    box-shadow: 0 0 30px rgba(255,159,80,0.35), 0 0 0 1px var(--accent2);
  }
  #carousel .card:hover { opacity: 0.85; }

  /* Flechas con blur glow */
  .arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(13,13,15,0.6);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,159,80,0.3);
    border-radius: 50%;
    color: var(--accent2);
    font-size: 32px;
    width: 44px; height: 44px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    z-index: 20;
    box-shadow: 0 0 18px rgba(255,159,80,0.2);
    line-height: 1;
    padding-bottom: 2px;
  }
  .arrow:hover {
    background: rgba(255,159,80,0.15);
    border-color: var(--accent2);
    box-shadow: 0 0 28px rgba(255,159,80,0.45);
    color: #fff;
  }
  #arrow-left  { left: 10px; }
  #arrow-right { right: 10px; }

  /* Ocultar grid en modo carrusel */
  #grid-wrap.hidden { display: none; }
  .card:nth-child(1)    { animation-delay: 0ms }
  .card:nth-child(2)    { animation-delay: 15ms }
  .card:nth-child(3)    { animation-delay: 30ms }
  .card:nth-child(4)    { animation-delay: 45ms }
  .card:nth-child(5)    { animation-delay: 60ms }
  .card:nth-child(6)    { animation-delay: 75ms }
  .card:nth-child(7)    { animation-delay: 90ms }
  .card:nth-child(8)    { animation-delay: 105ms }
  .card:nth-child(9)    { animation-delay: 120ms }
  .card:nth-child(10)   { animation-delay: 135ms }
  .card:nth-child(n+11) { animation-delay: 150ms }
</style>
</head>

const TOTAL    = GAMES.length;
const grid     = document.getElementById('grid');
const searchEl = document.getElementById('search');
const emptyEl  = document.getElementById('empty');
const countEl  = document.getElementById('visible-count');
const filterBtns = document.querySelectorAll('.filter-btn');
let activeFilter = 'All';
let searchTerm   = '';

function sendToAhk(obj) {
  if (window.chrome && window.chrome.webview)
    window.chrome.webview.postMessage(JSON.stringify(obj));
}

// Ajustar SOLO el alto de la ventana al contenido del grid (ancho fijo)
function fitWindow() {
  requestAnimationFrame(() => {
    const topbarH = document.getElementById('topbar').offsetHeight;
    const gridEl  = document.getElementById('grid');
    const pad     = 20;

    // Medir el alto real del grid después de renderizar
    const gridH  = gridEl.offsetHeight;
    const totalH = topbarH + pad + gridH + pad;

    sendToAhk({ action: 'resize_h', h: Math.ceil(totalH) });
  });
}

function renderGrid() {
  const term = searchTerm.toLowerCase();
  const filtered = GAMES.filter(g => {
    const matchType = activeFilter === 'All' || g.type === activeFilter;
    const matchName = g.name.toLowerCase().includes(term);
    return matchType && matchName;
  });
  countEl.textContent = filtered.length;
  grid.innerHTML = '';
  emptyEl.classList.toggle('visible', filtered.length === 0);
  filtered.forEach(g => {
    const card = document.createElement('div');
    card.className = 'card';
    const cover = document.createElement('img');
    cover.className = 'cover';
    cover.src     = g.img;
    cover.alt     = g.name;
    cover.loading = 'lazy';
    cover.onerror = () => { cover.src = './default.jpg'; };
    const badge = document.createElement('div');
    badge.className = 'badge';
    const badgeImg = document.createElement('img');
    badgeImg.src = './gallery_images/' + g.type + '.png';
    badgeImg.alt = g.type;
    badge.appendChild(badgeImg);
    const tooltip = document.createElement('div');
    tooltip.className = 'card-tooltip';
    tooltip.textContent = g.name;
    card.append(cover, badge, tooltip);
    card.addEventListener('click', () => sendToAhk({ action: 'launch', uri: g.uri }));
    grid.appendChild(card);
  });
  fitWindow();
}

// Búsqueda
searchEl.addEventListener('input', () => {
  searchTerm = searchEl.value;
  if (isCarousel) buildCarousel(); else renderGrid();
});

// Filtros
filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.type;
    if (isCarousel) buildCarousel(); else renderGrid();
  });
});

// Teclas
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') sendToAhk({ action: 'close' });
  if ((e.ctrlKey || e.metaKey) && e.key === 'f') { e.preventDefault(); searchEl.focus(); }
});

let isCarousel = false;

// Escuchar estado desde AHK (debe registrarse antes del renderGrid)
if (window.chrome && window.chrome.webview) {
  window.chrome.webview.addEventListener('message', e => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.action === 'set_view_state' && msg.state === 'carousel' && !isCarousel) {
        toggleView();
      }
    } catch(err) {}
  });
}

renderGrid();

// ── CARRUSEL ──
let carouselGames = [];
let carouselIndex = 0;

function toggleView() {
  isCarousel = !isCarousel;
  const btn = document.getElementById('btn-view');
  const gridWrap = document.getElementById('grid-wrap');
  const carouselWrap = document.getElementById('carousel-wrap');

  if (isCarousel) {
    btn.textContent = '⊟';
    btn.classList.add('active');
    gridWrap.classList.add('hidden');
    carouselWrap.classList.add('visible');
    buildCarousel();
    sendToAhk({ action: 'resize_h', h: getCarouselHeight() });
    sendToAhk({ action: 'save_view_state', state: 'carousel' });
  } else {
    btn.textContent = '⊞';
    btn.classList.remove('active');
    gridWrap.classList.remove('hidden');
    carouselWrap.classList.remove('visible');
    renderGrid();
    sendToAhk({ action: 'save_view_state', state: 'grid' });
  }
}

function getCarouselHeight() {
  const topbarH = document.getElementById('topbar').offsetHeight;
  return topbarH + 20 + 225 + 20; // padding + card height + padding
}

function buildCarousel() {
  const term = searchTerm.toLowerCase();
  carouselGames = GAMES.filter(g => {
    const matchType = activeFilter === 'All' || g.type === activeFilter;
    const matchName = g.name.toLowerCase().includes(term);
    return matchType && matchName;
  });
  carouselIndex = 0;
  renderCarousel();
}

function renderCarousel() {
  const carousel = document.getElementById('carousel');
  carousel.innerHTML = '';
  carouselGames.forEach((g, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (i === carouselIndex ? ' active-card' : '');
    card.dataset.index = i;
    const cover = document.createElement('img');
    cover.className = 'cover';
    cover.src = g.img;
    cover.alt = g.name;
    cover.loading = 'lazy';
    cover.onerror = () => { cover.src = './default.jpg'; };
    const badge = document.createElement('div');
    badge.className = 'badge';
    const badgeImg = document.createElement('img');
    badgeImg.src = './gallery_images/' + g.type + '.png';
    badge.appendChild(badgeImg);
    const tooltip = document.createElement('div');
    tooltip.className = 'card-tooltip';
    tooltip.textContent = g.name;
    card.append(cover, badge, tooltip);
    card.addEventListener('click', () => {
      if (i === carouselIndex) {
        sendToAhk({ action: 'launch', uri: g.uri });
      } else {
        carouselIndex = i;
        updateCarouselActive();
        centerActiveCard();
      }
    });
    carousel.appendChild(card);
  });
  centerActiveCard();
}

function updateCarouselActive() {
  document.querySelectorAll('#carousel .card').forEach((c, i) => {
    c.classList.toggle('active-card', i === carouselIndex);
  });
}

function centerActiveCard() {
  const carousel = document.getElementById('carousel');
  const cards = carousel.querySelectorAll('.card');
  if (!cards[carouselIndex]) return;
  const card = cards[carouselIndex];
  const carouselRect = carousel.getBoundingClientRect();
  const cardRect = card.getBoundingClientRect();
  const offset = cardRect.left - carouselRect.left - (carouselRect.width / 2) + (cardRect.width / 2);
  carousel.scrollLeft += offset;
}

function scrollCarousel(dir) {
  carouselIndex = Math.max(0, Math.min(carouselGames.length - 1, carouselIndex + dir));
  updateCarouselActive();
  centerActiveCard();
}

// Scroll del mouse en carrusel
document.getElementById('carousel-wrap').addEventListener('wheel', e => {
  e.preventDefault();
  scrollCarousel(e.deltaY > 0 ? 1 : -1);
}, { passive: false });

// Teclas de flecha en carrusel
document.addEventListener('keydown', e => {
  if (!isCarousel) return;
  if (e.key === 'ArrowRight') scrollCarousel(1);
  if (e.key === 'ArrowLeft')  scrollCarousel(-1);
});


</script>
